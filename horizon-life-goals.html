<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Horizon — Life Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1419;
    --surface:#1A2128;
    --surface-raised:#212A32;
    --line:#2C3640;
    --text:#E4DFD3;
    --text-dim:#9CA6AE;
    --text-faint:#5E6870;
    --gold:#C9A668;
    --gold-dim:#3A3322;
    --slate:#7A8B99;
    --clay:#B06A56;
    --good:#8FAE7E;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--ink); color:var(--text); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;}
  body{min-height:100vh; padding-bottom:50px;}
  .serif{font-family:'Fraunces',serif;}
  .wrap{max-width:560px; margin:0 auto; padding:0 18px;}

  .topbar{
    max-width:560px; margin:0 auto; padding:24px 18px 6px;
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .brand{font-family:'Fraunces',serif; font-weight:500; font-size:21px; letter-spacing:0.01em; color:var(--text);}
  .brand-dot{color:var(--gold);}
  .today-stamp{font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.08em;}

  .intro{padding:6px 18px 18px; max-width:560px; margin:0 auto;}
  .intro p{font-size:13px; color:var(--text-dim); line-height:1.5; margin:0;}

  /* ===== Goal card ===== */
  .goal-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px 18px;
    margin-bottom:16px;
  }
  .goal-head{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:4px;}
  .goal-title{font-family:'Fraunces',serif; font-size:21px; font-weight:500; color:var(--text); line-height:1.2;}
  .goal-kicker{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.09em; margin-bottom:3px;}
  .pace-tag{
    flex-shrink:0;
    font-size:10px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase;
    padding:4px 9px; border-radius:7px; white-space:nowrap;
  }
  .pace-good{background:rgba(143,174,126,0.15); color:var(--good);}
  .pace-warn{background:rgba(176,106,86,0.15); color:var(--clay);}
  .pace-neutral{background:rgba(122,139,153,0.15); color:var(--slate);}

  .goal-sub{font-size:13px; color:var(--text-dim); margin:6px 0 16px; line-height:1.45;}

  /* Horizon timeline */
  .horizon{position:relative; margin:18px 4px 10px;}
  .horizon-track{
    height:3px; background:var(--line); border-radius:2px; position:relative; overflow:visible;
  }
  .horizon-fill{
    position:absolute; top:0; left:0; height:100%;
    background:linear-gradient(90deg, var(--slate), var(--gold));
    border-radius:2px;
  }
  .horizon-marker{
    position:absolute; top:50%; transform:translate(-50%,-50%);
    width:13px; height:13px; border-radius:50%;
    background:var(--ink); border:2.5px solid var(--gold);
  }
  .horizon-marker.today{border-color:var(--text); background:var(--text);}
  .horizon-labels{display:flex; justify-content:space-between; margin-top:10px; font-size:11px; color:var(--text-faint);}

  .goal-stats{display:flex; gap:10px; margin-top:14px;}
  .stat-block{flex:1; background:var(--surface-raised); border:1px solid var(--line); border-radius:11px; padding:10px 12px;}
  .stat-block-label{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.06em;}
  .stat-block-val{font-family:'Fraunces',serif; font-size:18px; color:var(--text); margin-top:2px;}

  .goal-controls{display:flex; gap:8px; margin-top:14px;}
  .control-group{flex:1;}
  .control-label{font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px;}
  .control-input{
    width:100%; background:var(--surface-raised); border:1px solid var(--line); border-radius:9px;
    color:var(--text); font-family:'Inter',sans-serif; font-size:13.5px; padding:8px 10px; outline:none;
  }
  .control-input:focus{border-color:var(--gold);}
  .control-input::-webkit-calendar-picker-indicator{filter:invert(0.7);}

  .progress-edit-row{display:flex; gap:8px; margin-top:10px; align-items:flex-end;}
  .edit-btn{
    background:var(--gold); color:var(--ink); border:none; border-radius:9px;
    padding:9px 14px; font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap;
  }

  /* ===== Debt sub-section inside the debt goal card ===== */
  .debt-account{
    background:var(--surface-raised); border:1px solid var(--line); border-radius:11px;
    padding:12px 13px; margin-top:8px;
  }
  .debt-account.cleared{opacity:0.45;}
  .debt-account-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .debt-account-name{font-size:13.5px; font-weight:600; color:var(--text);}
  .debt-account-bal{font-size:13px; color:var(--gold); font-weight:600;}
  .cleared-pill{font-size:9.5px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--good); background:rgba(143,174,126,0.15); padding:2px 7px; border-radius:6px;}
  .debt-account-fields{display:flex; gap:7px;}
  .mini-field{flex:1;}
  .mini-label{font-size:9.5px; color:var(--text-faint); text-transform:uppercase; margin-bottom:3px;}
  .mini-input{
    width:100%; background:var(--ink); border:1px solid var(--line); border-radius:7px;
    color:var(--text); font-size:12.5px; padding:6px 7px; outline:none;
  }
  .mini-input:focus{border-color:var(--gold);}
  .toggle-debt-list{
    width:100%; background:none; border:none; color:var(--text-dim); font-size:12px;
    padding:10px 0 0; cursor:pointer; text-align:center; text-decoration:underline;
  }

  /* ===== Section divider ===== */
  .section-label{
    font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.1em;
    margin:28px 4px 12px; font-weight:600;
  }
  .section-label:first-of-type{margin-top:6px;}

  .loading{text-align:center; padding:80px 0; color:var(--text-faint); font-size:13px;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Horizon<span class="brand-dot">.</span></div>
  <div class="today-stamp" id="todayStamp"></div>
</div>
<div class="intro">
  <p>Three goals, tracked against the dates you set — and you can move any date as life changes.</p>
</div>

<div class="wrap" id="app">
  <div class="loading">loading...</div>
</div>

<script>
(function(){
  // This app runs on a static host (e.g. GitHub Pages), so it uses the
  // browser's own localStorage rather than any external storage service.
  // Data persists across closing the app, swiping it away, and restarting
  // the device. It's only lost if site data is manually cleared in Safari,
  // or if you switch to a different browser/device.
  window.storage = {
    async get(key){
      const val = localStorage.getItem(key);
      return val !== null ? { key, value: val } : null;
    },
    async set(key, value){
      localStorage.setItem(key, value);
      return { key, value };
    }
  };

  const DAY_MS = 24*60*60*1000;
  const todayISO = () => new Date().toISOString().slice(0,10);

  function daysBetween(a, b){
    return Math.round((new Date(b) - new Date(a)) / DAY_MS);
  }
  function fmtDateShort(iso){
    if(!iso) return '—';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', {month:'short', year:'numeric'});
  }
  function fmtMoney(n){
    return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:0, maximumFractionDigits:0});
  }
  function fmtMoney2(n){
    return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function clamp(n,lo,hi){ return Math.max(lo, Math.min(hi, n)); }

  // ---- Default data (seeded once; afterward only user edits matter) ----
  const DEBT_ACCOUNTS_DEFAULT = {
    'cap-one-venture-one': { name:'Capital One Venture One', startBalance:3349.02, balance:3349.02 },
    'cap-one-quicksilver':  { name:'Capital One Quicksilver',  startBalance:493.62,  balance:493.62 },
    'credit-one':           { name:'Credit One Credit Card',   startBalance:1230.31, balance:1230.31 },
    'amazon-store':         { name:'Amazon Store Card',        startBalance:103.90,  balance:103.90 },
    'net-credit':           { name:'Net Credit',               startBalance:2423.43, balance:2423.43 },
    'avant':                { name:'Avant',                    startBalance:3919.00, balance:3919.00 },
    'best-egg':             { name:'Best Egg',                 startBalance:2215.00, balance:2215.00 },
  };
  const DEBT_ORDER = ['credit-one','cap-one-quicksilver','cap-one-venture-one','net-credit','avant','best-egg','amazon-store'];

  const DEFAULT_STATE = {
    house: {
      targetDate: new Date(Date.now() + 4*365*DAY_MS).toISOString().slice(0,10),
      startDate: todayISO(),
      targetAmount: 40000,
      saved: 0,
    },
    debt: {
      targetDate: new Date(Date.now() + 18*30*DAY_MS).toISOString().slice(0,10),
      startDate: todayISO(),
      accounts: JSON.parse(JSON.stringify(DEBT_ACCOUNTS_DEFAULT)),
      listExpanded: true,
    },
    structure: {
      targetDate: new Date(Date.now() + 90*DAY_MS).toISOString().slice(0,10),
      startDate: todayISO(),
      weeksOnTrack: 0,
      totalWeeksTracked: 0,
    },
    social: {
      targetDate: '',
      startDate: todayISO(),
      note: '',
    }
  };

  let state = null;

  async function loadState(){
    try{
      const res = await window.storage.get('horizon-state');
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        state = Object.assign({}, JSON.parse(JSON.stringify(DEFAULT_STATE)), parsed);
        // Deep-merge debt accounts so new fields aren't lost
        if(parsed.debt && parsed.debt.accounts){
          state.debt.accounts = Object.assign({}, DEFAULT_STATE.debt.accounts, parsed.debt.accounts);
        }
      } else {
        state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      }
    }catch(e){
      console.error('load failed', e);
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  }

  async function saveState(){
    try{
      await window.storage.set('horizon-state', JSON.stringify(state));
    }catch(e){ console.error('save failed', e); }
  }

  function flushSave(){ saveState(); }
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushSave(); });
  window.addEventListener('pagehide', flushSave);
  window.addEventListener('beforeunload', flushSave);

  // ---- Pace calculation: are we ahead/behind schedule between startDate and targetDate? ----
  function paceStatus(startDate, targetDate, pctComplete){
    if(!targetDate) return {label:'No date set', cls:'pace-neutral'};
    const today = todayISO();
    const totalSpan = daysBetween(startDate, targetDate);
    const elapsed = daysBetween(startDate, today);
    if(totalSpan <= 0) return {label:'Set a future date', cls:'pace-neutral'};
    const expectedPct = clamp((elapsed/totalSpan)*100, 0, 100);
    const diff = pctComplete - expectedPct;
    if(elapsed > totalSpan && pctComplete < 100) return {label:'Past target date', cls:'pace-warn'};
    if(diff >= 5) return {label:'Ahead of pace', cls:'pace-good'};
    if(diff <= -10) return {label:'Behind pace', cls:'pace-warn'};
    return {label:'On pace', cls:'pace-neutral'};
  }

  function renderHorizonBar(startDate, targetDate, pctComplete){
    if(!targetDate){
      return `<div class="horizon"><div class="horizon-track"><div class="horizon-fill" style="width:0%"></div></div></div>`;
    }
    const today = todayISO();
    const totalSpan = Math.max(1, daysBetween(startDate, targetDate));
    const elapsed = clamp(daysBetween(startDate, today), 0, totalSpan);
    const todayPosPct = clamp((elapsed/totalSpan)*100, 0, 100);
    const fillPct = clamp(pctComplete, 0, 100);
    return `
      <div class="horizon">
        <div class="horizon-track">
          <div class="horizon-fill" style="width:${fillPct}%"></div>
          <div class="horizon-marker today" style="left:${todayPosPct}%" title="Today"></div>
        </div>
        <div class="horizon-labels">
          <span>${fmtDateShort(startDate)}</span>
          <span>${fmtDateShort(targetDate)}</span>
        </div>
      </div>`;
  }

  // ===================== HOUSE GOAL =====================
  function renderHouseCard(){
    const h = state.house;
    const pct = h.targetAmount > 0 ? clamp((h.saved/h.targetAmount)*100, 0, 100) : 0;
    const pace = paceStatus(h.startDate, h.targetDate, pct);
    const remaining = Math.max(0, h.targetAmount - h.saved);
    const monthsLeft = h.targetDate ? Math.max(0, Math.round(daysBetween(todayISO(), h.targetDate)/30)) : 0;
    const neededPerMonth = monthsLeft > 0 ? remaining/monthsLeft : remaining;

    return `
    <div class="goal-card" data-goal="house">
      <div class="goal-kicker">Goal 01</div>
      <div class="goal-head">
        <div class="goal-title serif">Buy a house</div>
        <div class="pace-tag ${pace.cls}">${pace.label}</div>
      </div>
      <div class="goal-sub">Down payment + closing cost fund, building toward a target date you control.</div>

      ${renderHorizonBar(h.startDate, h.targetDate, pct)}

      <div class="goal-stats">
        <div class="stat-block">
          <div class="stat-block-label">Saved</div>
          <div class="stat-block-val serif">${fmtMoney(h.saved)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Target</div>
          <div class="stat-block-val serif">${fmtMoney(h.targetAmount)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Per Month Needed</div>
          <div class="stat-block-val serif">${fmtMoney(neededPerMonth)}</div>
        </div>
      </div>

      <div class="goal-controls">
        <div class="control-group">
          <div class="control-label">Amount Saved</div>
          <input class="control-input" type="number" step="50" inputmode="decimal" data-field="saved" value="${h.saved}">
        </div>
        <div class="control-group">
          <div class="control-label">Target Amount</div>
          <input class="control-input" type="number" step="500" inputmode="decimal" data-field="targetAmount" value="${h.targetAmount}">
        </div>
      </div>
      <div class="goal-controls">
        <div class="control-group">
          <div class="control-label">Target Date</div>
          <input class="control-input" type="date" data-field="targetDate" value="${h.targetDate}">
        </div>
      </div>
    </div>`;
  }

  function bindHouseCard(){
    const card = document.querySelector('[data-goal="house"]');
    if(!card) return;
    card.querySelectorAll('input').forEach(input=>{
      input.addEventListener('change', (e)=>{
        const field = e.target.dataset.field;
        let val = e.target.value;
        if(field !== 'targetDate') val = parseFloat(val) || 0;
        state.house[field] = val;
        saveState();
        renderApp();
      });
    });
  }

  // ===================== DEBT GOAL =====================
  function orderedDebtAccounts(){
    return DEBT_ORDER.filter(id => state.debt.accounts[id]).map(id => Object.assign({id}, state.debt.accounts[id]));
  }
  function debtTotals(){
    const accs = orderedDebtAccounts();
    const totalStart = accs.reduce((s,a)=>s+a.startBalance,0);
    const totalRemaining = accs.reduce((s,a)=>s+Math.max(0,a.balance),0);
    return {totalStart, totalRemaining, paidOff: Math.max(0,totalStart-totalRemaining)};
  }

  function renderDebtCard(){
    const d = state.debt;
    const {totalStart, totalRemaining, paidOff} = debtTotals();
    const pct = totalStart > 0 ? clamp((paidOff/totalStart)*100, 0, 100) : 0;
    const pace = paceStatus(d.startDate, d.targetDate, pct);
    const accs = orderedDebtAccounts();
    const target = accs.find(a => a.balance > 0);

    let accountsHtml = '';
    if(d.listExpanded){
      accountsHtml = accs.map((acc, idx) => {
        const isCleared = acc.balance <= 0;
        const isTarget = target && acc.id === target.id;
        return `
        <div class="debt-account ${isCleared?'cleared':''}" data-acc="${acc.id}">
          <div class="debt-account-top">
            <div class="debt-account-name">${idx+1}. ${acc.name}${isTarget?' 🎯':''}</div>
            ${isCleared ? '<span class="cleared-pill">Cleared</span>' : `<span class="debt-account-bal serif">${fmtMoney2(acc.balance)}</span>`}
          </div>
          <div class="debt-account-fields">
            <div class="mini-field">
              <div class="mini-label">Balance</div>
              <input class="mini-input" type="number" step="0.01" inputmode="decimal" data-field="balance" value="${acc.balance}">
            </div>
          </div>
        </div>`;
      }).join('');
    }

    return `
    <div class="goal-card" data-goal="debt">
      <div class="goal-kicker">Goal 02</div>
      <div class="goal-head">
        <div class="goal-title serif">Pay off debt</div>
        <div class="pace-tag ${pace.cls}">${pace.label}</div>
      </div>
      <div class="goal-sub">7 accounts, maxed-out cards first. Update balances as statements close.</div>

      ${renderHorizonBar(d.startDate, d.targetDate, pct)}

      <div class="goal-stats">
        <div class="stat-block">
          <div class="stat-block-label">Paid Off</div>
          <div class="stat-block-val serif">${fmtMoney(paidOff)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Remaining</div>
          <div class="stat-block-val serif">${fmtMoney(totalRemaining)}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Progress</div>
          <div class="stat-block-val serif">${Math.round(pct)}%</div>
        </div>
      </div>

      <div class="goal-controls">
        <div class="control-group">
          <div class="control-label">Target Payoff Date</div>
          <input class="control-input" type="date" data-field="targetDate" value="${d.targetDate}">
        </div>
      </div>

      <button class="toggle-debt-list" id="toggleDebtList">${d.listExpanded ? 'Hide accounts ▲' : 'Show accounts ▼'}</button>
      ${accountsHtml}
    </div>`;
  }

  function bindDebtCard(){
    const card = document.querySelector('[data-goal="debt"]');
    if(!card) return;
    const dateInput = card.querySelector('[data-field="targetDate"]');
    if(dateInput){
      dateInput.addEventListener('change', (e)=>{
        state.debt.targetDate = e.target.value;
        saveState();
        renderApp();
      });
    }
    const toggleBtn = document.getElementById('toggleDebtList');
    if(toggleBtn){
      toggleBtn.addEventListener('click', ()=>{
        state.debt.listExpanded = !state.debt.listExpanded;
        saveState();
        renderApp();
      });
    }
    card.querySelectorAll('[data-acc]').forEach(accEl=>{
      const id = accEl.dataset.acc;
      const input = accEl.querySelector('.mini-input[data-field="balance"]');
      if(input){
        input.addEventListener('change', (e)=>{
          state.debt.accounts[id].balance = parseFloat(e.target.value) || 0;
          saveState();
          renderApp();
        });
      }
    });
  }

  // ===================== STRUCTURE GOAL =====================
  function renderStructureCard(){
    const s = state.structure;
    const pct = s.totalWeeksTracked > 0 ? clamp((s.weeksOnTrack/s.totalWeeksTracked)*100, 0, 100) : 0;
    const pace = paceStatus(s.startDate, s.targetDate, pct);

    return `
    <div class="goal-card" data-goal="structure">
      <div class="goal-kicker">Goal 03</div>
      <div class="goal-head">
        <div class="goal-title serif">Build daily structure</div>
        <div class="pace-tag ${pace.cls}">${pace.label}</div>
      </div>
      <div class="goal-sub">Weeks where your routine actually held, out of weeks tracked. Log it weekly.</div>

      ${renderHorizonBar(s.startDate, s.targetDate, pct)}

      <div class="goal-stats">
        <div class="stat-block">
          <div class="stat-block-label">On-Track Weeks</div>
          <div class="stat-block-val serif">${s.weeksOnTrack}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Weeks Tracked</div>
          <div class="stat-block-val serif">${s.totalWeeksTracked}</div>
        </div>
        <div class="stat-block">
          <div class="stat-block-label">Consistency</div>
          <div class="stat-block-val serif">${Math.round(pct)}%</div>
        </div>
      </div>

      <div class="goal-controls">
        <div class="control-group">
          <div class="control-label">Review Target Date</div>
          <input class="control-input" type="date" data-field="targetDate" value="${s.targetDate}">
        </div>
      </div>
      <div class="progress-edit-row">
        <button class="edit-btn" id="logGoodWeek">Log a week on track</button>
        <button class="edit-btn" id="logOffWeek" style="background:var(--surface-raised); color:var(--text-dim); border:1px solid var(--line);">Log a week off</button>
      </div>
    </div>`;
  }

  function bindStructureCard(){
    const card = document.querySelector('[data-goal="structure"]');
    if(!card) return;
    const dateInput = card.querySelector('[data-field="targetDate"]');
    if(dateInput){
      dateInput.addEventListener('change', (e)=>{
        state.structure.targetDate = e.target.value;
        saveState();
        renderApp();
      });
    }
    document.getElementById('logGoodWeek').addEventListener('click', ()=>{
      state.structure.weeksOnTrack += 1;
      state.structure.totalWeeksTracked += 1;
      saveState();
      renderApp();
    });
    document.getElementById('logOffWeek').addEventListener('click', ()=>{
      state.structure.totalWeeksTracked += 1;
      saveState();
      renderApp();
    });
  }

  // ===================== SOCIAL / RELATIONSHIP GOAL =====================
  function renderSocialCard(){
    const so = state.social;
    return `
    <div class="goal-card" data-goal="social">
      <div class="goal-kicker">Goal 04</div>
      <div class="goal-head">
        <div class="goal-title serif">Social life & dating</div>
        <div class="pace-tag pace-neutral">Ongoing</div>
      </div>
      <div class="goal-sub">This one isn't a countdown — meeting someone isn't on a schedule. Use this space to track effort and intention instead: putting yourself in more rooms, staying consistent with people, whatever you decide "progress" looks like for you.</div>
      <div class="control-group" style="margin-top:6px;">
        <div class="control-label">Notes</div>
        <textarea id="socialNote" class="control-input" style="min-height:64px; resize:vertical; font-family:'Inter',sans-serif;" placeholder="e.g. joined the Tuesday soccer league, set a goal to say yes to more plans...">${so.note || ''}</textarea>
      </div>
    </div>`;
  }

  function bindSocialCard(){
    const noteEl = document.getElementById('socialNote');
    if(noteEl){
      let t = null;
      noteEl.addEventListener('input', (e)=>{
        state.social.note = e.target.value;
        clearTimeout(t);
        t = setTimeout(saveState, 350);
      });
    }
  }

  // ===================== MAIN RENDER =====================
  function renderApp(){
    document.getElementById('todayStamp').textContent = new Date().toLocaleDateString('en-US',{month:'short', day:'numeric', year:'numeric'}).toUpperCase();
    let html = '';
    html += `<div class="section-label">Financial</div>`;
    html += renderHouseCard();
    html += renderDebtCard();
    html += `<div class="section-label">Personal</div>`;
    html += renderStructureCard();
    html += renderSocialCard();

    document.getElementById('app').innerHTML = html;
    bindHouseCard();
    bindDebtCard();
    bindStructureCard();
    bindSocialCard();
  }

  async function init(){
    await loadState();
    renderApp();
  }
  init();
})();
</script>
</body>
</html>
